<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/timeline.html' | relative_url }}">Timeline</a>
          <a href="{{ '/reports/' | relative_url }}">Reports</a>
          <a href="{{ '/sources/' | relative_url }}">Sources</a>
        </nav>
      </div>
    </header>
    <main class="shell content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="shell">
        Public event tracker generated from a private LLM-managed wiki. Only public-safe artifacts are published here.
      </div>
    </footer>
  </body>
</html>
